name: Build Windows EXE

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: PyInstaller on windows-latest
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 3.11 ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 numpy scipy matplotlib pyinstaller

      # ── 4. Check Chinese font (write Python to file, avoid heredoc) ────────
      - name: Check CJK font availability
        run: |
          python check_font.py
        env:
          PYTHONIOENCODING: utf-8

      # ── 5. Build EXE ───────────────────────────────────────────────────────
      - name: Build EXE with PyInstaller
        run: |
          python -m PyInstaller commsim.spec --noconfirm --clean
        env:
          PYTHONIOENCODING: utf-8

      # ── 6. Verify size ─────────────────────────────────────────────────────
      - name: Verify EXE
        shell: pwsh
        run: |
          $exe = "dist\CommSimLab.exe"
          if (-not (Test-Path $exe)) { throw "EXE not found: $exe" }
          $mb = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "EXE size: ${mb} MB"
          if ($mb -lt 20) { throw "EXE too small (${mb} MB) — build likely incomplete" }
          Write-Host "Verify PASSED"

      # ── 7. Rename to Chinese display name ─────────────────────────────────
      - name: Rename for distribution
        shell: pwsh
        run: |
          Copy-Item "dist\CommSimLab.exe" "dist\通信原理仿真软件.exe"
          Write-Host "Renamed OK"

      # ── 8. Upload artifact ─────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 通信原理仿真软件-Windows-EXE
          path: dist\通信原理仿真软件.exe
          retention-days: 30
          if-no-files-found: error

      # ── 9. Create GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "通信原理仿真软件 v1.0 (Build ${{ github.run_number }})"
          body: |
            ## 通信原理仿真软件 v1.0 — Windows 64位

            ### 下载与使用
            1. 点击下方 **Assets** 中的 `通信原理仿真软件.exe`
            2. 直接双击运行，无需安装 Python 或任何依赖
            3. 默认账号：`admin` / 密码：`admin123`

            ### 功能模块（共9个）
            | 类别 | 模块 |
            |------|------|
            | 基础实验 | 信号源、AM/FM/SSB、PCM/TDM、HDB3、2ASK/2PSK |
            | 扩展模块 | QPSK/16QAM/MSK、Hamming/LDPC/极化码、OFDM/MIMO/DVB-T |
            | 分析工具 | 示波器、频谱仪、BER曲线、星座图/眼图 |

            ---
            Branch: `${{ github.ref_name }}` · Commit: `${{ github.sha }}`
          files: dist\通信原理仿真软件.exe
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
