name: Build Windows EXE

on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:   # 支持手动触发

jobs:
  build:
    name: PyInstaller on windows-latest
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencies (with retry) ───────────────────────────────────────
      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Pin versions for reproducible builds
          pip install `
            "PyQt5==5.15.11" `
            "PyQt5-Qt5==5.15.2" `
            "numpy==1.26.4" `
            "scipy==1.13.1" `
            "matplotlib==3.9.2" `
            "pyinstaller==6.10.0"

      # ── 4. Confirm font availability ───────────────────────────────────────
      - name: Check Microsoft YaHei font (built-in on Windows)
        shell: pwsh
        run: |
          python - <<'EOF'
          import matplotlib.font_manager as fm
          names = {f.name for f in fm.fontManager.ttflist}
          cjk = [n for n in names if any(k in n for k in ['YaHei','SimHei','SimSun'])]
          print("CJK fonts available:", cjk)
          assert len(cjk) > 0, "No CJK font found — Chinese labels will be broken"
          EOF

      # ── 5. Build EXE ───────────────────────────────────────────────────────
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller commsim.spec --noconfirm --clean
          Write-Host "=== dist contents ==="
          Get-ChildItem dist

      # ── 6. Smoke-test the EXE (headless) ──────────────────────────────────
      - name: Smoke-test EXE (import check)
        shell: pwsh
        run: |
          # Verify the binary exists and is non-trivially sized (>20 MB)
          $exe = "dist\CommSimLab.exe"
          if (-not (Test-Path $exe)) { throw "EXE not found at $exe" }
          $size = (Get-Item $exe).Length
          Write-Host "EXE size: $([math]::Round($size/1MB,1)) MB"
          if ($size -lt 20MB) { throw "EXE suspiciously small ($size bytes)" }
          Write-Host "Smoke-test PASSED"

      # ── 7. Rename to Chinese filename for the artifact ────────────────────
      - name: Rename EXE for distribution
        shell: pwsh
        run: |
          Copy-Item "dist\CommSimLab.exe" "dist\通信原理仿真软件.exe"
          Write-Host "Renamed OK"

      # ── 8. Upload artifact (available for 30 days) ────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: 通信原理仿真软件-Windows-EXE
          path: dist\通信原理仿真软件.exe
          retention-days: 30
          if-no-files-found: error

      # ── 9. Create GitHub Release (every build on this branch) ─────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "通信原理仿真软件 v1.0 (Build ${{ github.run_number }})"
          body: |
            ## 通信原理仿真软件 v1.0 — Windows 64位

            ### 下载与使用
            1. 点击下方 **Assets** 中的 `通信原理仿真软件.exe`
            2. 直接双击运行，**无需安装 Python 或任何依赖**
            3. 默认账号：`admin` / 密码：`admin123`

            ### 功能模块（共9个）
            | 类别 | 模块 |
            |------|------|
            | 基础实验 | 信号源分析、AM/FM/SSB调制、PCM/TDM、HDB3码型、2ASK/2PSK |
            | 扩展模块 | QPSK/16QAM/MSK、Hamming/LDPC/极化码、OFDM/MIMO/DVB-T |
            | 分析工具 | 示波器、频谱仪、BER曲线、星座图/眼图 |

            ### 修复记录
            - 图表中文字体乱码修复（自动检测 Microsoft YaHei）
            - PyInstaller 打包包含完整 matplotlib 字体数据

            ---
            构建信息: Branch `${{ github.ref_name }}` · Commit `${{ github.sha }}`
          files: dist\通信原理仿真软件.exe
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
